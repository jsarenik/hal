name: Build and Release AArch64 Binary

on:
  push:
    # Trigger only when pushing version tags like v1.0.0
    tags:
      - "v*"
  workflow_dispatch: # Still allows you to trigger manually for testing

permissions:
  contents: write # Required to create a release and upload assets

jobs:
  build-and-release:
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.74.0
          targets: aarch64-unknown-linux-gnu

      - name: Cache Cargo dependencies
        uses: swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --release --target aarch64-unknown-linux-gnu --locked

      - name: Prepare binary for upload
        # Rename the binary so it clearly indicates it is for aarch64
        run: |
          cd target/aarch64-unknown-linux-gnu/release/
          mv hal hal-aarch64-unknown-linux-gnu

      - name: Create Release and Upload Binary
        uses: softprops/action-gh-release@v2
        with:
          files: target/aarch64-unknown-linux-gnu/release/hal-aarch64-unknown-linux-gnu
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
