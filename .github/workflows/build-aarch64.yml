name: Build AArch64 Binary

on:
  push:
    branches: [ "master" ]
  workflow_dispatch: # Allows you to manually trigger the build from the UI

jobs:
  build-arm64:
    # Uses GitHub's native, free ARM64 Linux runner
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.74.0 # Matching the repo's specific MSRV
          targets: aarch64-unknown-linux-gnu

      - name: Cache Cargo dependencies
        uses: swatinem/rust-cache@v2

      - name: Build binary
        # The repo documentation specifies using --locked to respect Cargo.lock
        run: cargo build --release --target aarch64-unknown-linux-gnu --locked

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hal-aarch64-linux
          path: target/aarch64-unknown-linux-gnu/release/hal
          if-no-files-found: error
