name: Build and Release Static AArch64 Binary

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install musl-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.74.0
          targets: aarch64-unknown-linux-musl

      - name: Cache Cargo dependencies
        uses: swatinem/rust-cache@v2

      - name: Patch broken jobserver dependency
        # Forces the broken v0.1.11 crate to update to a compatible version for musl
        run: cargo update -p jobserver

      - name: Build static binary
        # We drop --locked here so cargo can use our updated jobserver patch
        run: cargo build --release --target aarch64-unknown-linux-musl

      - name: Prepare binary for upload
        run: |
          cd target/aarch64-unknown-linux-musl/release/
          mv hal hal-aarch64-unknown-linux-musl

      - name: Create Release and Upload Binary
        uses: softprops/action-gh-release@v2
        with:
          files: target/aarch64-unknown-linux-musl/release/hal-aarch64-unknown-linux-musl
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Prepare binary for upload
        run: |
          cd target/aarch64-unknown-linux-musl/release/
          mv hal hal-aarch64-unknown-linux-musl

      - name: Create Release and Upload Binary
        uses: softprops/action-gh-release@v2
        with:
          files: target/aarch64-unknown-linux-musl/release/hal-aarch64-unknown-linux-musl
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
